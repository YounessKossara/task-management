<div class="d-flex flex-column p-4 h-100 bg-dark text-white">
    <h4 class="mb-4 d-flex align-items-center">
        <i class="bi bi-kanban me-2 text-primary"></i> TeamSync
    </h4>
    <ul class="nav nav-pills flex-column mb-auto">
        <li *ngIf="!isUserOnly()" class="nav-item">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-white my-1">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a routerLink="/projects" routerLinkActive="active" class="nav-link text-white my-1">
                <i class="bi bi-folder me-2"></i> Mes Projets
            </a>
        </li>
        <li *ngIf="isAdmin()" class="nav-item">
            <a routerLink="/users" routerLinkActive="active" class="nav-link text-white my-1">
                <i class="bi bi-people me-2"></i> Équipe
            </a>
        </li>
    </ul>

    <div class="mt-auto pt-3">
        <div class="bg-gradient bg-secondary bg-opacity-25 rounded p-3 mb-3 hover-profile"
            style="cursor: pointer; transition: all 0.3s;" routerLink="/profile">
            <div class="d-flex align-items-center">
                <i class="bi bi-person-circle fs-3 text-info me-3"></i>
                <div class="text-white">
                    <h6 class="mb-0 fw-bold">Mon Profil</h6>
                    <small class="text-white-50">Gérer votre compte</small>
                </div>
            </div>
        </div>
        <button class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center"
            (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
        </button>
    </div>
    <hr>
    <div>
        <small class="text-muted">© 2026 Admin</small>
    </div>
</div>
