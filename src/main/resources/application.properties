spring.application.name=task_project

# Serveur
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager
spring.datasource.username=taskmanager
spring.datasource.password=taskmanager
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/task-manager

# RustFS (S3-compatible)
rustfs.url=http://localhost:9000
rustfs.access-key=rustfsadmin
rustfs.secret-key=rustfsadmin
rustfs.bucket-name=identity-documents

# Keycloak Admin
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=task-manager
keycloak.client-id=task-manager-api
keycloak.client-secret=URUnjFGNdBElOXZIPLzSGEgehKl7w9XZ

